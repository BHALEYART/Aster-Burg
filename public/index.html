<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary -->
  <title>AsterBoard — Live Aster DEX Leaderboard & Top Gainers</title>
  <meta name="description" content="Real-time leaderboard for Aster DEX. Track the top 10 traders by PnL, live top gainers, and best trades across 1h, 1d, 1w and 1m timeframes." />
  <meta name="keywords" content="Aster DEX leaderboard, Aster DEX top traders, Aster DEX gainers, ASTER token, perpetual DEX leaderboard, on-chain traders" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AsterBoard — Live Aster DEX Leaderboard & Top Gainers" />
  <meta property="og:description" content="Real-time leaderboard for Aster DEX. Track the top 10 traders by PnL, live top gainers, and best trades across 1h, 1d, 1w and 1m timeframes." />
  <meta property="og:image" content="/asterboard-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="AsterBoard" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AsterBoard — Live Aster DEX Leaderboard & Top Gainers" />
  <meta name="twitter:description" content="Real-time leaderboard for Aster DEX. Track the top 10 traders by PnL, live top gainers, and best trades across 1h, 1d, 1w and 1m timeframes." />
  <meta name="twitter:image" content="/asterboard-preview.png" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🍔</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-emoji">🍔</span>
        <span class="brand-name">ASTER<span class="brand-accent">BOARD</span></span>
      </div>
      <div class="header-right">
        <a href="/bots/" class="nav-btn">🤖 Bots</a>
        <div class="live-pill">
          <span class="live-dot" id="live-dot"></span>
          <span class="live-label" id="live-label">Connecting...</span>
        </div>
        <div class="tf-tabs" id="tf-tabs">
          <button class="tab active" data-tf="1h">1h</button>
          <button class="tab" data-tf="1d">1d</button>
          <button class="tab" data-tf="1w">1w</button>
          <button class="tab" data-tf="1m">1m</button>
        </div>
      </div>
    </div>
  </header>

  <div class="ticker-wrap">
    <div class="ticker-inner" id="ticker-inner">
      🍔 LOADING MARKET DATA &nbsp;💩&nbsp; PLEASE WAIT 🍔 LOADING MARKET DATA &nbsp;💩&nbsp; PLEASE WAIT &nbsp;&nbsp;
    </div>
  </div>

  <main class="main">

    <div class="stat-bar">
      <div class="stat-card">
        <div class="stat-emoji">📊</div>
        <div class="stat-label">Symbols</div>
        <div class="stat-value" id="stat-symbols">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">🚀</div>
        <div class="stat-label">Top gainer</div>
        <div class="stat-value up" id="stat-top-gainer">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">💩</div>
        <div class="stat-label">Top loser</div>
        <div class="stat-value down" id="stat-top-loser">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">📈</div>
        <div class="stat-label">Avg change</div>
        <div class="stat-value" id="stat-avg">—</div>
      </div>
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🚀 Top gainers <span class="tf-badge" id="gainer-tf-badge">1h</span></h2>
        <span class="source-badge" id="gainer-source">live</span>
      </div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="gainersChart"></canvas></div>
      </div>
      <div class="gainer-list" id="gainer-list"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">💥 Best trades <span class="tf-badge" id="trades-tf-badge">1h</span></h2>
      </div>
      <div class="card" id="trades-list">
        <div class="loading-msg">💩 Scooping trades...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>🍔 Aster Trader Board · Data via <a href="https://fapi.asterdex.com" target="_blank" rel="noopener">fapi.asterdex.com</a></span>
    <span id="last-updated"></span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
